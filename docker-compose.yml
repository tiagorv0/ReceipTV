version: '3.8'

services:
  db:
    image: postgres:17
    container_name: receiptv-db
    restart: always
    environment:
      POSTGRES_DB: receiptv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5434:5432'
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - receiptv_default
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d receiptv" ]
      timeout: 20s
      retries: 10

  server:
    build:
      context: ./server
    container_name: receiptv-server
    restart: always
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:root@db:5432/receiptv
    networks:
      - receiptv_default
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        # VITE_API_URL é baked no bundle pelo Vite em build-time
        - VITE_API_URL=http://localhost:5000/api
    container_name: receiptv-client
    restart: always
    ports:
      - '5173:80'
    environment:
      # PORT usado pelo nginx.conf via envsubst
      - PORT=80
    networks:
      - receiptv_default
    depends_on:
      - server

volumes:
  postgres_data:

networks:
  receiptv_default:
    driver: bridge

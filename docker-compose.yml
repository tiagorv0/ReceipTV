version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: receiptv-db
    restart: always
    environment:
      MYSQL_DATABASE: receiptv
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3307:3306'
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    networks:
      - receiptv_default
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  server:
    build: ./server
    container_name: receiptv-server
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=receiptv
    networks:
      - receiptv_default
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    container_name: receiptv-client
    restart: always
    ports:
      - '5173:5173'
    environment:
      # API endpoint para o React buscar no navegador (porta 5000 do host)
      - VITE_API_URL=http://localhost:5000/api
    networks:
      - receiptv_default
    depends_on:
      - server

volumes:
  mysql_data:


networks:
  receiptv_default:
    driver: bridge

version: '3.8'

services:
  db:
    image: postgres:17
    container_name: receiptv-db
    restart: always
    environment:
      POSTGRES_DB: receiptv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5434:5432'
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - receiptv_default
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d receiptv" ]
      timeout: 20s
      retries: 10

  server:
    build: ./server
    container_name: receiptv-server
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_NAME=receiptv
    networks:
      - receiptv_default
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    container_name: receiptv-client
    restart: always
    ports:
      - '5173:5173'
    environment:
      # API endpoint para o React buscar no navegador (porta 5000 do host)
      - VITE_API_URL=http://localhost:5000/api
    networks:
      - receiptv_default
    depends_on:
      - server

volumes:
  postgres_data:

networks:
  receiptv_default:
    driver: bridge

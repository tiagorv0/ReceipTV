<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReceipTV — Sem conexão</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0d1117;
        color: #a1a1aa;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 1.5rem;
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        text-align: center;
        max-width: 360px;
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        background: rgba(34, 197, 94, 0.08);
        border: 1px solid rgba(34, 197, 94, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-wrap svg {
        width: 36px;
        height: 36px;
        color: #22c55e;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #e4e4e7;
      }

      p {
        font-size: 0.9rem;
        line-height: 1.6;
        color: #71717a;
      }

      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.5rem;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        border-radius: 10px;
        color: #22c55e;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: rgba(34, 197, 94, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 15.75A2.25 2.25 0 0 1 5.25 13.5h13.5A2.25 2.25 0 0 1 21 15.75v.75a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 16.5v-.75ZM3 8.25A2.25 2.25 0 0 1 5.25 6h13.5A2.25 2.25 0 0 1 21 8.25v.75a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 9v-.75Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21" />
        </svg>
      </div>

      <h1>Você está sem conexão</h1>

      <p>
        O ReceipTV precisa de internet para carregar seus comprovantes e relatórios.
        Verifique sua conexão e tente novamente.
      </p>

      <button onclick="window.location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>

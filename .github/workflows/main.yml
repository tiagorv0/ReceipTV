name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────
  # 1. Client — install, lint & build
  # ────────────────────────────────────────────
  client:
    name: Client (React / Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────
  # 2. Server — install & smoke-test
  # ────────────────────────────────────────────
  server:
    name: Server (Node / Express)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        # Note: replace with your real test command when tests are added.
        # The default script just prints an error and exits 1,
        # so this step is only meaningful after you add a test framework.
        continue-on-error: true

  # ────────────────────────────────────────────
  # 3. Docker — validate compose file & build images
  # ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [client, server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose file
        run: docker compose config --quiet

      - name: Build all images
        run: docker compose build
        env:
          # Provide a dummy API URL so the client build succeeds
          VITE_API_URL: http://localhost:5000/api

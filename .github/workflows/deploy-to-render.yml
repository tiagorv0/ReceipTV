name: Deploy to Render

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits), '"modified":') &&
      true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for server changes
        id: server-changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^server/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Render deploy (Server)
        if: steps.server-changes.outputs.changed == 'true'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}"
        
  deploy-client:
    name: Deploy Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for client changes
        id: client-changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^client/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Render deploy (Client)
        if: steps.client-changes.outputs.changed == 'true'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}"
